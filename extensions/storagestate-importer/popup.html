<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoVis 登录态采集器</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .hint {
        color: #94a3b8;
        font-size: 11px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 11px;
        color: #cbd5e1;
        margin: 8px 0 3px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 9px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #f1f5f9;
        font-size: 12px;
        outline: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      input:focus {
        border-color: #6366f1;
      }
      button {
        width: 100%;
        margin-top: 14px;
        padding: 9px;
        border: none;
        border-radius: 9px;
        background: #6366f1;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      button:hover:not(:disabled) {
        background: #4f46e5;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .row > div {
        flex: 1;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 8px;
        padding: 9px;
        display: none;
      }
      #status.ok {
        display: block;
        background: rgba(16, 185, 129, 0.12);
        color: #6ee7b7;
        border: 1px solid rgba(16, 185, 129, 0.4);
      }
      #status.err {
        display: block;
        background: rgba(244, 63, 94, 0.12);
        color: #fda4af;
        border: 1px solid rgba(244, 63, 94, 0.4);
      }
      #status.info {
        display: block;
        background: rgba(99, 102, 241, 0.12);
        color: #c7d2fe;
        border: 1px solid rgba(99, 102, 241, 0.4);
      }
      a {
        color: #a5b4fc;
      }
    </style>
  </head>
  <body>
    <h1>🔐 AutoVis 登录态采集器</h1>
    <p class="hint">
      先在本浏览器里登录目标站点（如淘宝）并打开要采集的页面，再点下方按钮采集 cookies + localStorage 并导入
      AutoVis。
    </p>

    <label for="runnerUrl">AutoVis 运行机地址</label>
    <input id="runnerUrl" placeholder="http://172.23.31.219:8787" />

    <label for="projectId">Project ID</label>
    <input id="projectId" placeholder="project-xxxx" />

    <label for="profileId">Auth Profile ID</label>
    <input id="profileId" placeholder="authprofile-xxxx" />

    <label for="targetUrlId">Target URL ID（留空＝项目主域名）</label>
    <input id="targetUrlId" placeholder="target-url-xxxx" />

    <label for="cookieDomains">采集 cookie 的域名（逗号分隔）</label>
    <input id="cookieDomains" placeholder="taobao.com,tmall.com" />

    <label for="token">会话 Token（仅当 AutoVis 开启鉴权时填）</label>
    <input id="token" placeholder="可留空" />

    <button id="capture">采集当前页面登录态并导入</button>
    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
