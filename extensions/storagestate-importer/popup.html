<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoVis 登录态采集器</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .hint {
        color: #94a3b8;
        font-size: 11px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 11px;
        color: #cbd5e1;
        margin: 8px 0 3px;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 9px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #f1f5f9;
        font-size: 12px;
        outline: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      input:focus,
      select:focus {
        border-color: #6366f1;
      }
      select:disabled {
        opacity: 0.5;
      }
      button {
        width: 100%;
        margin-top: 14px;
        padding: 9px;
        border: none;
        border-radius: 9px;
        background: #6366f1;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      button:hover:not(:disabled) {
        background: #4f46e5;
      }
      button.secondary {
        margin-top: 0;
        width: auto;
        padding: 7px 12px;
        background: #334155;
        font-size: 12px;
        white-space: nowrap;
      }
      button.secondary:hover:not(:disabled) {
        background: #475569;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      .row > .grow {
        flex: 1;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 8px;
        padding: 9px;
        display: none;
      }
      #status.ok {
        display: block;
        background: rgba(16, 185, 129, 0.12);
        color: #6ee7b7;
        border: 1px solid rgba(16, 185, 129, 0.4);
      }
      #status.err {
        display: block;
        background: rgba(244, 63, 94, 0.12);
        color: #fda4af;
        border: 1px solid rgba(244, 63, 94, 0.4);
      }
      #status.info {
        display: block;
        background: rgba(99, 102, 241, 0.12);
        color: #c7d2fe;
        border: 1px solid rgba(99, 102, 241, 0.4);
      }
      a {
        color: #a5b4fc;
      }
    </style>
  </head>
  <body>
    <h1>🔐 AutoVis 登录态采集器</h1>
    <p class="hint">
      在本浏览器登录目标站点（如 epicgames）→ 连接 AutoVis → 选项目/Profile → 一键采集导入。
    </p>

    <label for="runnerUrl">AutoVis 运行机地址</label>
    <div class="row">
      <div class="grow">
        <input id="runnerUrl" placeholder="http://172.23.31.219:8787" />
      </div>
      <button id="connect" class="secondary">连接</button>
    </div>

    <label for="token">会话 Token（开鉴权时填；或先在本浏览器登录 AutoVis 即免填）</label>
    <input id="token" placeholder="可留空" />

    <label for="projectId">项目</label>
    <select id="projectId" disabled>
      <option value="">— 先点「连接」加载 —</option>
    </select>

    <label for="profileId">登录状态 Profile</label>
    <select id="profileId" disabled>
      <option value="">— 选项目后加载 —</option>
    </select>

    <label for="targetUrlId">目标网址（留空＝项目主域名）</label>
    <select id="targetUrlId" disabled>
      <option value="">（项目主域名）</option>
    </select>

    <label for="cookieDomains">采集 cookie 的域名（逗号分隔，已按当前页自动填）</label>
    <input id="cookieDomains" placeholder="epicgames.com" />

    <button id="capture" disabled>采集当前页面登录态并导入</button>
    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
